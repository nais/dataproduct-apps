apiVersion: "nais.io/v1"
kind: "Naisjob"
metadata:
  name: dataproduct-apps-collect
  namespace: nais
  labels:
    team: nais
    apiserver-access: enabled
spec:
  command:
    - dataproduct-apps-collect
  schedule: "13 4 * * *"
  liveness:
    path: /isHealthy
  readiness:
    path: /isReady
  kafka:
    pool: nav-infrastructure
  env:
    - name: no_proxy
      value: "localhost,kubernetes.default,aivencloud.com"
  webproxy: true
